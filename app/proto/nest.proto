syntax = "proto3";
package nest;

service NestService {
  rpc GetNest (NestRequest) returns (NestResponse);
  rpc StreamingRecognize (stream AudioRequest) returns (stream AudioResponse);
}

message NestRequest {
  string request_message = 1;
}

message NestResponse {
  string response_message = 1;
}

// 새로 추가
message AudioRequest {
  bytes audio_chunk = 1;
}

message AudioResponse {
  string transcript = 1;
}
