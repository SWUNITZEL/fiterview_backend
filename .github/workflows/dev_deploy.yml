name: Deploy to AWS EC2 using Docker

on:
  push:
    branches:
      - develop

env:
  DOCKER_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/fastapi
  EC2_HOST: ${{ secrets.EC2_HOST }}
  EC2_SSH_USER: ubuntu
  PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
  CONTAINER_NAME: fastapi
  WEB_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-web
  WORKER_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-worker

jobs:
  build-and-push-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and push web image
        run: docker buildx build --platform linux/amd64 -t ${{ env.WEB_IMAGE_NAME }}:latest --file ./Dockerfile.web . --push

      - name: Build and push worker image
        run: docker buildx build --platform linux/amd64 -t ${{ env.WORKER_IMAGE_NAME }}:latest --file ./Dockerfile.worker . --push

  deploy-to-ec2:
    needs: build-and-push-docker
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_SSH_USER }}
          key: ${{ env.PRIVATE_KEY }}
          timeout: 30m
          script: |
            cd /home/ubuntu/fastapi-app
            sudo docker compose down || true
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            sudo docker image prune -f
            sudo docker compose pull web worker
            sudo docker compose up -d --build --force-recreate
